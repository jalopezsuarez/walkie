name: Build Android APK (native)

# Compiles the native Kotlin app in android/ and publishes a debug APK to a
# GitHub Release. Debug builds are signed with the standard debug key, so they
# install via "unknown sources" — no secrets or Firebase config required to
# build (FCM just stays inert until google-services.json is added).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-native.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        working-directory: android
        env:
          VERSION_NAME: ${{ github.event.inputs.version || '1.0.0' }}
        run: |
          set -euxo pipefail
          curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          GRADLE=/tmp/gradle/gradle-8.11.1/bin/gradle
          "$GRADLE" :app:assembleDebug --no-daemon --stacktrace
          cp app/build/outputs/apk/debug/app-debug.apk "$GITHUB_WORKSPACE/walkie-android-${VERSION_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: walkie-android-apk
          path: walkie-android-*.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.event.inputs.version || '1.0.0' }}-${{ github.run_number }}
          name: Walkie Android ${{ github.event.inputs.version || '1.0.0' }}
          body: |
            APK nativo (debug) de Walkie para Android.

            Instalación: descarga el `.apk`, ábrelo en el móvil y permite
            "Instalar apps de orígenes desconocidos" si te lo pide.

            Nota: build de depuración firmado con la clave debug estándar.
          files: walkie-android-*.apk
