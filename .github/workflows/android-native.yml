name: Build Android APK (native)

# Compiles the native Kotlin app in android/ and publishes a signed release
# APK to a GitHub Release. Signs with the ANDROID_KEYSTORE_BASE64 repo secret
# (production key) when present, otherwise an ephemeral key. The "Verify APK
# signature" step prints the signer certificate SHA-256 for confirmation.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.1)"
        required: false
        default: "1.0.1"
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-native.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build signed release APK
        working-directory: android
        env:
          VERSION_NAME: ${{ github.event.inputs.version || '1.0.1' }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          # Provide a signing keystore: use the repo secret if present, else
          # generate an ephemeral one so the release APK is always signed.
          export WALKIE_KEYSTORE="$RUNNER_TEMP/walkie.keystore"
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$WALKIE_KEYSTORE"
            export WALKIE_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            export WALKIE_KEY_ALIAS="${ANDROID_KEY_ALIAS:-walkie}"
            export WALKIE_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            echo "Signing with the configured keystore secret."
          else
            export WALKIE_KEYSTORE_PASSWORD="$(openssl rand -hex 16)"
            export WALKIE_KEY_ALIAS="walkie"
            export WALKIE_KEY_PASSWORD="$WALKIE_KEYSTORE_PASSWORD"
            keytool -genkeypair -v -keystore "$WALKIE_KEYSTORE" -alias walkie \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$WALKIE_KEYSTORE_PASSWORD" -keypass "$WALKIE_KEY_PASSWORD" \
              -dname "CN=Walkie, O=Walkie, C=ES"
            echo "::warning::No ANDROID_KEYSTORE_BASE64 secret set — signed with an EPHEMERAL key. Add the secret for stable in-place updates."
          fi

          curl -sL https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          GRADLE=/tmp/gradle/gradle-8.11.1/bin/gradle
          "$GRADLE" :app:assembleRelease --no-daemon --stacktrace
          APK="$(ls app/build/outputs/apk/release/*.apk | head -n1)"
          echo "Built signed APK: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/walkie-android-${VERSION_NAME}.apk"

      - name: Verify APK signature
        run: |
          set -euo pipefail
          APKSIGNER="$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -n1)"
          echo "Using: $APKSIGNER"
          "$APKSIGNER" verify --verbose --print-certs "$GITHUB_WORKSPACE"/walkie-android-*.apk \
            | grep -iE "Verified using|certificate SHA-256 digest" || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: walkie-android-apk
          path: walkie-android-*.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.event.inputs.version || '1.0.1' }}-${{ github.run_number }}
          name: Walkie Android ${{ github.event.inputs.version || '1.0.1' }}
          make_latest: true
          body: |
            APK nativo (release, firmado) de Walkie para Android.

            Instalación: descarga el `.apk`, ábrelo en el móvil y permite
            "Instalar apps de orígenes desconocidos" si te lo pide.

            Firma: con el keystore del repo (secret `ANDROID_KEYSTORE_BASE64`)
            si está configurado; si no, con una clave efímera por build
            (para actualizaciones limpias, configura el secret — ver
            android/README.md).
          files: walkie-android-*.apk
